<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JARVIS AI SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #050b10, #000);
    color: #00ffe1;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid #00ffe1;
    letter-spacing: 3px;
}

#chat {
    position: relative;
    z-index: 2;
    height: calc(100vh - 130px);
    overflow-y: auto;
    padding: 15px;
}

.msg {
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    max-width: 70%;
}

.user {
    margin-left: auto;
    text-align: right;
    background: rgba(255,255,255,0.05);
    color: #fff;
}

.jarvis {
    margin-right: auto;
    border: 1px solid #00ffe1;
    background: rgba(0,255,225,0.05);
}

footer {
    position: relative;
    z-index: 2;
    display: flex;
    padding: 10px;
    border-top: 1px solid #00ffe1;
}

input {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid #00ffe1;
    color: #00ffe1;
    outline: none;
}

button {
    margin-left: 5px;
    padding: 10px;
    background: #00ffe1;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>JARVIS AI • ONLINE</header>

<div id="chat"></div>

<footer>
    <input id="input" placeholder="Ask JARVIS..." />
    <button onclick="send()">Send</button>
    <button onclick="startVoice()">🎤</button>
</footer>

<script>
// ======================
// STATE
// ======================
let jarvisAwake = false;

// ======================
// UI
// ======================
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// ======================
// VOICE OUTPUT
// ======================
function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 1;
    msg.pitch = 1;
    speechSynthesis.speak(msg);
}

// ======================
// (OPTIONAL) CHATGPT BRAIN HOOK
// ======================
async function askAI(prompt) {
    // Replace with backend API for real ChatGPT brain
    return "AI response placeholder: " + prompt;
}

// ======================
// SIMPLE JARVIS BRAIN
// ======================
function brain(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("hello")) return "JARVIS online.";
    if (msg.includes("who are you")) return "I am JARVIS — your AI assistant.";
    if (msg.includes("memory")) return "System memory active.";
    if (msg.includes("what can you do")) return "I assist with thinking, planning, and productivity.";

    return "Processing request...";
}

// ======================
// SEND MESSAGE
// ======================
async function send() {
    if (!jarvisAwake) {
        add("System asleep. Say 'JARVIS' or clap to activate.", "jarvis");
        return;
    }

    const text = input.value.trim();
    if (!text) return;

    add(text, "user");

    input.value = "";

    const response = brain(text);

    setTimeout(() => {
        add(response, "jarvis");
        speak(response);
    }, 400);
}

// ======================
// VOICE INPUT + WAKE WORD
// ======================
function startVoice() {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = "en-US";
    rec.continuous = true;

    rec.onresult = (e) => {
        const text = e.results[e.results.length - 1][0].transcript.toLowerCase();

        // WAKE WORD
        if (text.includes("jarvis")) {
            jarvisAwake = true;
            add("JARVIS ACTIVATED", "jarvis");
            speak("System online.");
            return;
        }

        if (!jarvisAwake) return;

        input.value = text;
        send();
    };

    rec.start();
}

// ======================
// CLAP DETECTION
// ======================
let audioCtx, analyser, dataArray;

async function initClap() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const mic = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;

    mic.connect(analyser);

    dataArray = new Uint8Array(analyser.frequencyBinCount);

    detectClap();
}

function detectClap() {
    analyser.getByteFrequencyData(dataArray);

    let volume = dataArray.reduce((a,b)=>a+b)/dataArray.length;

    if (volume > 60 && !jarvisAwake) {
        jarvisAwake = true;
        add("CLAP DETECTED — JARVIS ONLINE", "jarvis");
        speak("System activated.");
    }

    requestAnimationFrame(detectClap);
}

// ======================
// BACKGROUND ANIMATION
// ======================
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let dots = Array.from({length: 60}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: (Math.random()-0.5),
    vy: (Math.random()-0.5)
}));

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ffe1";

    dots.forEach(d => {
        d.x += d.vx;
        d.y += d.vy;

        if (d.x < 0 || d.x > canvas.width) d.vx *= -1;
        if (d.y < 0 || d.y > canvas.height) d.vy *= -1;

        ctx.fillRect(d.x,d.y,2,2);
    });

    requestAnimationFrame(animate);
}
animate();

// ======================
// STARTUP
// ======================
window.onload = () => {
    add("JARVIS in standby mode. Clap or say 'JARVIS' to activate.", "jarvis");
    speak("System in standby mode.");
    initClap();
};
</script>

</body>
</html>
